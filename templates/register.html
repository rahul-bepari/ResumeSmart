<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - ResumeSmart</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-page">

<div class="auth-box">
    <div class="auth-logo">Resume<span style="color:#1a202c;">Smart</span></div>
    <div class="auth-title">Create Account</div>
    <div class="auth-subtitle">Join ResumeSmart and boost your career</div>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" name="full_name" class="form-input" placeholder="Your full name" required>
        </div>
        <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" name="email" class="form-input" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-input" placeholder="Create a password" required>
        </div>
        <button type="submit" class="btn-full">Create Account →</button>
    </form>

    <div class="auth-link">
        Already have an account? <a href="/login">Login here</a>
    </div>
</div>

</body>
</html>
